name: quark_web
description: "Deja el desarrollo en nuestras manos, enfócate en crecer."
publish_to: "none"
version: 0.3.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  google_fonts: ^7.0.0
  web: ^1.1.0

  visibility_detector: ^0.4.0+2
  carousel_slider: ^5.0.0
  firebase_core: ^3.8.1
  firebase_analytics: ^11.3.6
  cloud_firestore: ^5.5.1
  go_router: ^15.1.1
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.2
  quarks_version_checker:
    git:
      url: https://github.com/quarks-studio/quarks_version_checker
      ref: v1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  icons_launcher: ^3.0.0

icons_launcher:
  image_path: 'assets/isotipo.png'
  platforms:
    web:
      enable: true

flutter:
  uses-material-design: true

  assets:
    - assets/isotipo.png
    - assets/isologo.png
    - assets/misc/office.png
    - assets/services/mobile_app.png
    - assets/services/web_development.png
    - assets/services/software_development.png
    - assets/favicon.jpeg
    - assets/tools/awsLogo.png
    - assets/tools/dartLogo.png
    - assets/tools/firebaseLogo.png
    - assets/tools/flutterLogo.png
    - assets/tools/androidLogo.png
    - assets/tools/iosLogo.png
    - assets/tools/pythonLogo.webp
    - assets/misc/en.png
    - assets/misc/es.png
    - assets/misc/amongus_crewmate.png
    - assets/portfolio/quiropraxia_1.png
    - assets/portfolio/quiropraxia_2.png
    - assets/portfolio/quiropraxia_3.png
    - assets/portfolio/sanpablo_1.png
    - assets/portfolio/sanpablo_2.png
    - assets/portfolio/sanpablo_3.png
    - assets/portfolio/eyhera_1.png
    - assets/portfolio/eyhera_2.png
    - assets/portfolio/eyhera_3.png
    - assets/portfolio/atmtc_1.png
    - assets/portfolio/atmtc_2.png
    - assets/portfolio/atmtc_3.png
